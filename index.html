<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Markdown Blog</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg: #ffffff;
            --text: #333;
            --link: #0969da;
            --font-main: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        }

        body {
            font-family: var(--font-main);
            line-height: 1.6;
            color: var(--text);
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
            background-color: var(--bg);
        }

        #content-area {
            border-top: 1px solid #eee;
            margin-top: 20px;
            padding-top: 20px;
        }

        .post-link {
            display: block;
            font-size: 1.2rem;
            margin: 10px 0;
            color: var(--link);
            text-decoration: none;
            cursor: pointer;
        }

        .post-link:hover { text-decoration: underline; }

        .back-btn {
            display: inline-block;
            margin-bottom: 20px;
            padding: 8px 16px;
            background: #f6f8fa;
            border: 1px solid #d0d7de;
            border-radius: 6px;
            color: #24292f;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }

        /* Basic Markdown Styling */
        pre { background: #f6f8fa; padding: 16px; overflow: auto; border-radius: 6px; }
        code { font-family: monospace; background: #afb8c133; padding: 0.2em 0.4em; border-radius: 6px; }
        img { max-width: 100%; height: auto; }
        blockquote { border-left: 4px solid #d0d7de; color: #57606a; padding-left: 1em; margin-left: 0; }
    </style>
</head>
<body>

    <header>
        <h1 id="blog-title">My GitHub Blog</h1>
    </header>

    <div id="main">
        <div id="file-list">Loading files...</div>
        <div id="content-area" style="display:none;"></div>
    </div>

    <script>
        /** CONFIGURATION: Change these to your repo details **/
        const CONFIG = {
            owner: 'MyMel2001', // e.g., 'octocat'
            repo: 'log', // e.g., 'Spoon-Knife'
            path: ''                // Root folder or subdirectory (e.g., 'posts')
        };

        const listEl = document.getElementById('file-list');
        const contentEl = document.getElementById('content-area');

        // 1. Fetch File List
        async function fetchFiles() {
            try {
                const response = await fetch(`https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${CONFIG.path}`);
                if (!response.ok) throw new Error('Repository not found or API limit reached.');
                
                const files = await response.json();
                renderList(files);
            } catch (err) {
                listEl.innerText = `Error: ${err.message}`;
            }
        }

        // 2. Filter and Render List
        function renderList(files) {
            listEl.innerHTML = '<h2>Articles</h2>';
            const mdFiles = files.filter(f => f.name.toLowerCase().endsWith('.md'));

            if (mdFiles.length === 0) {
                listEl.innerHTML += '<p>No markdown files found.</p>';
                return;
            }

            mdFiles.forEach(file => {
                const link = document.createElement('a');
                link.className = 'post-link';
                // Clean up the filename for the display title
                link.innerText = file.name.replace(/\.md$/i, '').replace(/[-_]/g, ' ');
                link.onclick = () => loadPost(file.download_url);
                listEl.appendChild(link);
            });
        }

        // 3. Fetch Content and Render Markdown
        async function loadPost(url) {
            listEl.style.display = 'none';
            contentEl.style.display = 'block';
            contentEl.innerHTML = '<em>Loading article...</em>';

            try {
                const response = await fetch(url);
                const markdown = await response.text();
                
                // Use Marked.js to convert MD to HTML
                const htmlContent = marked.parse(markdown);

                // Add Back Button and Rendered HTML
                contentEl.innerHTML = `
                    <button class="back-btn" onclick="location.reload()">← Back to List</button>
                    <div>${htmlContent}</div>
                `;
            } catch (err) {
                contentEl.innerHTML = `<p>Error loading content: ${err.message}</p>`;
            }
        }

        // Start the app
        fetchFiles();
    </script>
</body>
</html>
